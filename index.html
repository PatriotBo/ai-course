<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=course-showcase.html">
  <title>AI Course Ops Deck · 正在进入课程作战室</title>
  <link rel="canonical" href="course-showcase.html">
  <style>
    :root {
      --bg-ink: #070806;
      --paper: #f2e6c8;
      --paper-soft: #d9cab0;
      --line: rgba(242, 230, 200, 0.16);
      --accent-red: #ff6a3d;
      --accent-cyan: #75e9ff;
      --font-display: "Songti SC", "STSong", "Noto Serif CJK SC", "Times New Roman", serif;
      --font-body: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --font-mono: "SFMono-Regular", "Cascadia Code", "Menlo", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--paper);
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 12% 0%, rgba(255, 106, 61, 0.18), transparent 30%),
        radial-gradient(circle at 82% 8%, rgba(117, 233, 255, 0.13), transparent 28%),
        linear-gradient(135deg, #050604 0%, #111611 48%, #070806 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(242, 230, 200, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(242, 230, 200, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 10%, black 0 58%, transparent 86%);
    }

    main {
      position: relative;
      width: min(720px, calc(100% - 40px));
      border: 1px solid var(--line);
      border-radius: 34px;
      padding: 42px;
      background:
        linear-gradient(145deg, rgba(245, 235, 210, 0.105), rgba(245, 235, 210, 0.045)),
        linear-gradient(180deg, rgba(16, 22, 17, 0.94), rgba(6, 8, 6, 0.90));
      box-shadow: 0 34px 100px rgba(0, 0, 0, 0.46), inset 0 1px rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 4%, rgba(255, 106, 61, 0.14), transparent 31%),
        linear-gradient(120deg, rgba(117, 233, 255, 0.08), transparent 34%);
      pointer-events: none;
    }

    main > * {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent-red);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      font-family: var(--font-display);
      font-size: clamp(36px, 7vw, 62px);
      line-height: 0.98;
      letter-spacing: -0.055em;
    }

    p {
      margin: 0;
      color: var(--paper-soft);
      font-size: 17px;
      line-height: 1.78;
    }

    a {
      color: var(--accent-cyan);
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">AI Course Ops Deck</p>
    <h1>正在进入课程作战室</h1>
    <p>如果没有自动跳转，请点击 <a href="course-showcase.html">course-showcase.html</a>。</p>
  </main>
</body>
</html>
